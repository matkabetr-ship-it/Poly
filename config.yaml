app:
  env: dev
  paper_mode: true
  base_currency: USD

risk:
  max_daily_loss_pct: 0.02
  circuit_breaker_drawdown_pct: 0.05
  circuit_breaker_consecutive_losses: 3
  kelly_fraction_cap: 0.5
  hard_position_cap_pct: 0.02
  slippage_tolerance_pct: 0.015
  max_open_markets: 8
  max_category_exposure_pct: 0.25

execution:
  order_ttl_seconds: 45
  poll_interval_seconds: 2
  ws_reconnect_max_seconds: 30
  request_timeout_seconds: 10

scanner:
  min_volume: 20000
  min_liquidity: 5000
  max_days_to_expiry: 45
  categories: [politics, macro, crypto, sports]

alerts:
  discord_webhook_url: ""
  telegram_bot_token: ""
  telegram_chat_id: ""
  email_to: ""

storage:
  url: "sqlite+aiosqlite:///./bot.db"

exchange:
  rest_base_url: "https://REPLACE_WITH_OFFICIAL_ENDPOINT"
  ws_url: "wss://REPLACE_WITH_OFFICIAL_WS"
  api_key: ""
  api_secret: ""
